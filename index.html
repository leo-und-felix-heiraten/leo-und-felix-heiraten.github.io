<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo & Felix heiraten!</title>
    
    <!-- Google Fonts für elegante Typografie -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- FontAwesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- DESIGN SYSTEM (FARBEN & SCHRIFTEN) --- */
        :root {
            --bg-color: #fbfcf9;         /* Warmes Off-White */
            --primary: #606c38;          /* Elegantes Salbeigrün */
            --primary-dark: #283618;     /* Dunkles Waldgrün */
            --accent: #dda15e;           /* Warmes Gold/Champagner */
            --text-dark: #2b2d42;        /* Dunkelgrau für Lesbarkeit */
            --text-light: #ffffff;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Montserrat', Arial, sans-serif;
        }

        /* --- BASIC RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- SPERRBILDSCHIRM (PIN PAD) --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-dark);
            background: linear-gradient(rgba(40, 54, 24, 0.92), rgba(40, 54, 24, 0.96)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: var(--text-light);
            text-align: center;
            padding: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .lock-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .lock-container h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-style: italic;
        }

        .lock-container p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* PIN Display (Sterne) */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .pin-dot.active {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Keypad Gitter */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.5rem;
            font-weight: 400;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin: 0 auto;
            transition: all 0.2s;
            user-select: none;
        }

        .key:active, .key:hover {
            background: var(--accent);
            color: var(--primary-dark);
            transform: scale(1.05);
        }

        .key.action-key {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
        }

        #lock-error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 25px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- HAUPTINHALT (Versteckt bis Freigabe) --- */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        section {
            padding: 80px 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
        }

        h2 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: "";
            display: block;
            width: 60px;
            height: 2px;
            background-color: var(--accent);
            margin: 15px auto 0 auto;
        }

        p {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 20px auto;
            color: #555;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: var(--text-light);
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
            border: 2px solid var(--primary);
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(96, 108, 56, 0.2);
            cursor: pointer;
        }

        .btn:hover {
            background-color: transparent;
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* --- PERSÖNLICHE BEGRÜSSUNGS-BOX --- */
        .welcome-badge {
            background-color: rgba(221, 161, 94, 0.15);
            border: 1px solid var(--accent);
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 25px;
            animation: fadeIn 1s ease;
        }

        .welcome-badge h3 {
            color: var(--primary-dark);
            font-size: 1.3rem;
            font-family: var(--font-serif);
            font-style: italic;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            color: var(--text-light);
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            font-style: italic;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero p.subtitle {
            font-size: 1.8rem;
            font-family: var(--font-serif);
            margin-bottom: 30px;
            color: var(--text-light);
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
        }

        .hero .date {
            font-size: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px 30px;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* --- COUNTDOWN --- */
        .countdown-container {
            background-color: var(--primary-dark);
            color: var(--text-light);
            padding: 40px 20px;
            text-align: center;
        }

        .countdown-container h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-family: var(--font-serif);
            letter-spacing: 1px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            min-width: 100px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .countdown-item span {
            display: block;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        .countdown-item label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- ABLAUFPLAN (TIMELINE) --- */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 50px auto 0 auto;
            padding: 0 10px;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background-color: var(--accent);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -1px;
        }

        .container {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%;
            text-align: left;
        }

        .container::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            right: -8px;
            background-color: var(--bg-color);
            border: 4px solid var(--primary);
            top: 15px;
            border-radius: 50%;
            z-index: 1;
        }

        .left {
            left: 0;
        }

        .right {
            left: 50%;
        }

        .right::after {
            left: -8px;
        }

        .content {
            padding: 20px 30px;
            background-color: white;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .content h3 {
            font-family: var(--font-serif);
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .time {
            font-weight: 600;
            color: var(--accent);
            display: block;
            margin-bottom: 10px;
        }

        /* --- LOCATION CARD --- */
        .location-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
            text-align: left;
        }

        .location-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
        }

        .location-card i {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .location-card h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            color: var(--primary-dark);
        }

        /* --- RSVP SECTION WITH DYNAMIC GUEST CARDS --- */
        .rsvp {
            background-color: var(--primary-dark);
            color: var(--text-light);
        }

        .rsvp h2 {
            color: var(--text-light);
        }

        .rsvp h2::after {
            background-color: var(--accent);
        }

        .rsvp p {
            color: rgba(255, 255, 255, 0.9);
        }

        .rsvp-form-container {
            background: white;
            color: var(--text-dark);
            padding: 40px;
            border-radius: 12px;
            max-width: 600px;
            margin: 40px auto 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-dark);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
        }

        .radio-option input {
            margin-right: 8px;
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        /* Dynamische Gästekarten */
        .guest-block {
            background: #f4f6f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .guest-block h4 {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--primary-dark);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(96, 108, 56, 0.2);
            padding-bottom: 8px;
        }

        .remove-guest-btn {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remove-guest-btn:hover {
            text-decoration: underline;
        }

        .add-guest-btn {
            display: block;
            width: 100%;
            background-color: transparent;
            color: var(--primary);
            border: 2px dashed var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.3s;
            text-align: center;
            font-size: 0.95rem;
        }

        .add-guest-btn:hover {
            background-color: rgba(96, 108, 56, 0.05);
            border-style: solid;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
        }

        /* Success Message styling */
        #form-status {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #e8f5e9;
            color: #2e7d32;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }

        /* --- GIFTS --- */
        .gifts i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--primary-dark);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        footer p {
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        /* ==========================================
           📊 STYLES FÜR DAS ADMIN-DASHBOARD (PIN: 1407)
           ========================================== */
        #admin-dashboard {
            display: none;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .admin-header h1 {
            font-family: var(--font-serif);
            color: var(--primary-dark);
            font-size: 2.2rem;
        }

        /* Stats Cards */
        .admin-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .admin-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary);
            text-align: center;
        }

        .admin-card.accent-card {
            border-top-color: var(--accent);
        }

            font-size: 0.9rem;
            text-transf
