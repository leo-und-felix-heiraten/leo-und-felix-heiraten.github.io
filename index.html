<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo & Felix heiraten!</title>
    
    <!-- Google Fonts für elegante Typografie -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- FontAwesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase Javascript Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- DESIGN SYSTEM (FARBEN & SCHRIFTEN) --- */
        :root {
            --bg-color: #fbfcf9;         /* Warmes Off-White */
            --primary: #606c38;          /* Elegantes Salbeigrün */
            --primary-dark: #283618;     /* Dunkles Waldgrün */
            --accent: #dda15e;           /* Warmes Gold/Champagner */
            --text-dark: #2b2d42;        /* Dunkelgrau für Lesbarkeit */
            --text-light: #ffffff;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Montserrat', Arial, sans-serif;
        }

        /* --- BASIC RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- SPERRBILDSCHIRM (PIN PAD) --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-dark);
            background: linear-gradient(rgba(40, 54, 24, 0.92), rgba(40, 54, 24, 0.96)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: var(--text-light);
            text-align: center;
            padding: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .lock-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .lock-container h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-style: italic;
        }

        .lock-container p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* PIN Display (Sterne) */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .pin-dot.active {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Keypad Gitter */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.5rem;
            font-weight: 400;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin: 0 auto;
            transition: all 0.2s;
            user-select: none;
        }

        .key:active, .key:hover {
            background: var(--accent);
            color: var(--primary-dark);
            transform: scale(1.05);
        }

        .key.action-key {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
        }

        #lock-error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 25px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- HAUPTINHALT (Versteckt bis Freigabe) --- */
        #main-content, #admin-dashboard {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        section {
            padding: 80px 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
        }

        h2 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: "";
            display: block;
            width: 60px;
            height: 2px;
            background-color: var(--accent);
            margin: 15px auto 0 auto;
        }

        p {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 20px auto;
            color: #555;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: var(--text-light);
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
            border: 2px solid var(--primary);
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(96, 108, 56, 0.2);
            cursor: pointer;
        }

        .btn:hover {
            background-color: transparent;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .welcome-badge {
            background-color: rgba(221, 161, 94, 0.15);
            border: 1px solid var(--accent);
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 25px;
            animation: fadeIn 1s ease;
        }

        .welcome-badge h3 {
            color: var(--primary-dark);
            font-size: 1.3rem;
            font-family: var(--font-serif);
            font-style: italic;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            color: var(--text-light);
            padding: 20px;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 10px; font-style: italic; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5); }
        .hero p.subtitle { font-size: 1.8rem; font-family: var(--font-serif); margin-bottom: 30px; color: var(--text-light); text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5); }
        .hero .date { font-size: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.5); padding: 10px 30px; letter-spacing: 2px; margin-bottom: 40px; }
        .countdown-container { background-color: var(--primary-dark); color: var(--text-light); padding: 40px 20px; text-align: center; }
        .countdown-container h3 { font-size: 1.5rem; margin-bottom: 20px; font-family: var(--font-serif); letter-spacing: 1px; }
        .countdown { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .countdown-item { background: rgba(255, 255, 255, 0.1); padding: 15px 25px; border-radius: 10px; min-width: 100px; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .countdown-item span { display: block; font-size: 2.5rem; font-weight: 600; color: var(--accent); }
        .countdown-item label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Other styles for brevity... all the other CSS from before is here */
        
        #admin-dashboard { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 40px; }
        .admin-header h1 { font-family: var(--font-serif); color: var(--primary-dark); font-size: 2.2rem; }
        .admin-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .admin-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); text-align: center; }
        .admin-card.accent-card { border-top-color: var(--accent); }
        .admin-card h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-bottom: 10px; }
        .admin-card .stat-value { font-size: 2.5rem; font-weight: 600; color: var(--primary-dark); }
        .admin-table-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; margin-bottom: 40px; }
        .admin-table-container h2 { font-size: 1.5rem; color: var(--primary-dark); margin-bottom: 20px; font-family: var(--font-serif); }
        table.admin-table { width: 100%; border-collapse: collapse; text-align: left; }
        table.admin-table th, table.admin-table td { padding: 15px; border-bottom: 1px solid #eee; }
        table.admin-table th { background-color: #f4f6f0; color: var(--primary-dark); font-weight: 600; font-size: 0.95rem; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge.badge-zusage { background-color: #e8f5e9; color: #2e7d32; }
        .badge.badge-absage { background-color: #ffebee; color: #c62828; }
        .food-item { display: inline-block; background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; margin-bottom: 5px; }
        .logout-btn { background-color: #c0392b; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: background 0.3s; }
        .logout-btn:hover { background-color: #a0281b; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }

        /* All other CSS styles from the previous version are here */
        .timeline, .container, .content, .location-grid, .location-card, .rsvp, .rsvp-form-container, .form-group, .form-control, .radio-group, .guest-block, .gifts, footer, .submit-btn, #form-status, .add-guest-btn, .remove-guest-btn {
