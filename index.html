    <style>
        /* --- DESIGN SYSTEM (FARBEN & SCHRIFTEN) --- */
        :root {
            --bg-color: #fbfcf9;         /* Warmes Off-White */
            --primary: #606c38;          /* Elegantes Salbeigrün */
            --primary-dark: #283618;     /* Dunkles Waldgrün */
            --accent: #dda15e;           /* Warmes Gold/Champagner */
            --text-dark: #2b2d42;        /* Dunkelgrau für Lesbarkeit */
            --text-light: #ffffff;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Montserrat', Arial, sans-serif;
        }

        /* --- BASIC RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- SPERRBILDSCHIRM (PIN PAD) --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-dark);
            background: linear-gradient(rgba(40, 54, 24, 0.92), rgba(40, 54, 24, 0.96)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: var(--text-light);
            text-align: center;
            padding: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .lock-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .lock-container h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-style: italic;
        }

        .lock-container p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* PIN Display (Sterne) */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .pin-dot.active {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Keypad Gitter */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.5rem;
            font-weight: 400;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin: 0 auto;
            transition: all 0.2s;
            user-select: none;
        }

        .key:active, .key:hover {
            background: var(--accent);
            color: var(--primary-dark);
            transform: scale(1.05);
        }

        .key.action-key {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
        }

        #lock-error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 25px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- HAUPTINHALT (Versteckt bis Freigabe) --- */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        section {
            padding: 80px 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
        }

        h2 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: "";
            display: block;
            width: 60px;
            height: 2px;
            background-color: var(--accent);
            margin: 15px auto 0 auto;
        }

        p {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 20px auto;
            color: #555;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: var(--text-light);
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
            border: 2px solid var(--primary);
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(96, 108, 56, 0.2);
            cursor: pointer;
        }

        .btn:hover {
            background-color: transparent;
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* --- PERSÖNLICHE BEGRÜSSUNGS-BOX --- */
        .welcome-badge {
            background-color: rgba(221, 161, 94, 0.15);
            border: 1px solid var(--accent);
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 25px;
            animation: fadeIn 1s ease;
        }

        .welcome-badge h3 {
            color: var(--primary-dark);
            font-size: 1.3rem;
            font-family: var(--font-serif);
            font-style: italic;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            color: var(--text-light);
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            font-style: italic;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero p.subtitle {
            font-size: 1.8rem;
            font-family: var(--font-serif);
            margin-bottom: 30px;
